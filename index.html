<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FinanzAgent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e2e8f0;font-family:-apple-system,sans-serif;min-height:100vh}
header{background:#1a1d27;padding:14px 16px;border-bottom:1px solid #2a2f45}
.logo{color:#4f8ef7;font-weight:700;font-size:16px}
.price-card{background:#1a1d27;border:1px solid #2a2f45;border-radius:12px;padding:16px;margin:12px;display:flex;justify-content:space-between;align-items:center}
.sym{font-weight:700;font-size:14px;color:#4f8ef7}
.name{font-size:11px;color:#64748b;margin-top:2px}
.price{font-size:16px;font-weight:700;text-align:right}
.chg{font-size:12px;text-align:right;margin-top:2px}
.up{color:#22c55e}.dn{color:#ef4444}
.section-title{color:#64748b;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:12px 16px 4px}
.loading{color:#64748b;font-size:12px;padding:16px;text-align:center}
.status{background:#1a1d27;border:1px solid #2a2f45;border-radius:8px;margin:12px;padding:12px;font-size:12px;color:#64748b}
.status.ok{border-color:#22c55e;color:#22c55e}
.status.err{border-color:#ef4444;color:#ef4444}
</style>
</head>
<body>
<header><div class="logo">FinanzAgent Pro</div></header>

<div class="section-title">Status</div>
<div class="status" id="status">Verbindung wird geprüft…</div>

<div class="section-title">Krypto Live</div>
<div id="prices"><div class="loading">Lädt…</div></div>

<div class="section-title">Forex</div>
<div id="forex"><div class="loading">Lädt…</div></div>

<script>
async function loadPrices() {
  const statusEl = document.getElementById('status');
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,ripple&vs_currencies=chf&include_24hr_change=true');
    const d = await r.json();
    
    statusEl.textContent = '✓ CoinGecko API verbunden';
    statusEl.className = 'status ok';
    
    const assets = [
      {id:'bitcoin',sym:'BTC',name:'Bitcoin'},
      {id:'ethereum',sym:'ETH',name:'Ethereum'},
      {id:'solana',sym:'SOL',name:'Solana'},
      {id:'ripple',sym:'XRP',name:'XRP'},
    ];
    
    document.getElementById('prices').innerHTML = assets.map(a => {
      const p = d[a.id];
      if (!p) return '';
      const chg = p.chf_24h_change;
      const price = p.chf >= 1000 
        ? 'CHF ' + Math.round(p.chf).toLocaleString('de-CH')
        : 'CHF ' + p.chf.toFixed(4);
      return `<div class="price-card">
        <div><div class="sym">${a.sym}</div><div class="name">${a.name}</div></div>
        <div><div class="price">${price}</div>
        <div class="chg ${chg>=0?'up':'dn'}">${chg>=0?'▲':'▼'}${Math.abs(chg).toFixed(2)}%</div></div>
      </div>`;
    }).join('');
  } catch(e) {
    statusEl.textContent = '✗ Fehler: ' + e.message;
    statusEl.className = 'status err';
    document.getElementById('prices').innerHTML = '<div class="loading">Fehler beim Laden</div>';
  }
}

async function loadForex() {
  try {
    const r = await fetch('https://api.exchangerate-api.com/v4/latest/CHF');
    const d = await r.json();
    const pairs = [
      {l:'USD/CHF', v:(1/d.rates.USD).toFixed(4)},
      {l:'EUR/CHF', v:(1/d.rates.EUR).toFixed(4)},
      {l:'GBP/CHF', v:(1/d.rates.GBP).toFixed(4)},
    ];
    document.getElementById('forex').innerHTML = pairs.map(p => 
      `<div class="price-card"><div class="sym">${p.l}</div><div class="price">${p.v}</div></div>`
    ).join('');
  } catch(e) {
    document.getElementById('forex').innerHTML = '<div class="loading">Forex n.v.</div>';
  }
}

loadPrices();
loadForex();
setInterval(loadPrices, 60000);
</script>
</body>
</html>
